{{ define "main" }}
<div class="wrap" style="padding: 100px 0; text-align: center;">
  <div class="error-page" style="display: inline-block; text-align: left;">
    <pre style="background: var(--bg2); border: 1px solid var(--line); padding: 1.5rem; border-radius: var(--radius); line-height: 1.6; font-family: var(--mono);"><span class="prompt" style="color: var(--accent-alt);">❯</span> <span class="cmd" style="color: var(--accent);">cat</span> <span class="arg" style="color: var(--tx);">/404</span>
<span class="error" style="color: var(--bad); font-weight: bold; display: block; margin-top: 8px;">error: file not found</span></pre>
    <p style="margin-top: 1.5rem; text-align: center; font-family: var(--mono); font-size: 13.5px;"><a href="{{ .Site.Home.RelPermalink }}">← cd ~/</a></p>
  </div>
</div>
{{ end }}
