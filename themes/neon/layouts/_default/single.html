{{ define "main" }}
<article class="post-single wrap">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}" class="date">
        {{ .Date.Format "Jan 02, 2006" }}
      </time>
      {{ if .Params.categories }}
      <span class="separator">·</span>
      <span class="categories">
        {{ range .Params.categories }}
        <a href="{{ "categories/" | relURL }}{{ . | urlize }}">#{{ . }}</a>
        {{ end }}
      </span>
      {{ end }}
      <span class="separator">·</span>
      <span class="reading-time">{{ .ReadingTime }} min read</span>
    </div>
  </header>

  <div class="post-layout">
    <div class="post-content">
      {{ .Content }}
    </div>
    <aside class="post-toc" id="post-toc">
      <div class="post-toc-title">Contents</div>
      <nav id="toc-nav"></nav>
    </aside>
  </div>

  <footer class="post-footer">
    {{ with .Params.tags }}
    <span class="label">tags:</span>
    <div class="post-tags">
      {{ range . }}
      <a href="{{ "tags/" | relURL }}{{ . | urlize }}" class="tag-badge">#{{ . }}</a>
      {{ end }}
    </div>
    {{ end }}
  </footer>
</article>

<script>
(function() {
  const toc = document.getElementById('post-toc');
  const nav = document.getElementById('toc-nav');
  if (!toc || !nav) return;

  // Find all headings in post content
  const content = document.querySelector('.post-content');
  const headings = content.querySelectorAll('h1, h2, h3');
  if (headings.length === 0) {
    toc.style.display = 'none';
    return;
  }

  // Build TOC
  const items = [];
  headings.forEach(function(h, i) {
    // Ensure heading has an id
    if (!h.id) h.id = 'heading-' + i;
    items.push({
      id: h.id,
      text: h.textContent,
      level: parseInt(h.tagName.charAt(1))
    });
  });

  // Render TOC
  nav.innerHTML = items.map(function(item) {
    var cls = item.level === 3 ? ' class="toc-h3"' : '';
    return '<a href="#' + item.id + '" data-id="' + item.id + '"' + cls + '>' + item.text + '</a>';
  }).join('');

  // IntersectionObserver for scroll spy
  var links = nav.querySelectorAll('a');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      var link = nav.querySelector('a[data-id="' + entry.target.id + '"]');
      if (link) {
        if (entry.isIntersecting) {
          links.forEach(function(l) { l.classList.remove('active'); });
          link.classList.add('active');
        }
      }
    });
  }, {
    rootMargin: '-10% 0px -80% 0px',
    threshold: 0
  });

  items.forEach(function(item) {
    var el = document.getElementById(item.id);
    if (el) observer.observe(el);
  });
})();
</script>
{{ end }}
