baseURL: "https://davidchandra95.github.io/"
languageCode: "en-us"
title: "commit.log"
theme: "neon"
paginate: 5
summaryLength: 30

enableGitInfo: false
enableRobotsTXT: true

# Disable RSS
disableKinds:
  - RSS

outputs:
  home:
    - HTML

taxonomies:
  tag: tags
  category: categories

permalinks:
  posts: /posts/:slug/

# Syntax highlighting
markup:
  highlight:
    style: onedark
    lineNumbersInTable: false
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

# Exclude files from output
module:
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: themes/neon/static
      target: static

# Sitemap
sitemap:
  changeFreq: ""
  priority: -1
  filename: sitemap.xml

params:
  description: "Thoughts on code, systems, and building things."
  author: "David Chandra"
  github: "davidchandra95"
  accent: "#f5a97f"      # Bun peach-orange
  accentAlt: "#7fd1a8"   # Bun green
  bg: "#0b0c0f"          # Bun deep dark bg
  fg: "#f2ede2"          # Bun rich warm text
  # Font stacks
  fontHeading: '-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif'
  fontBody: '-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif'
  fontCode: '"JetBrains Mono", "SF Mono", "Fira Code", monospace'
